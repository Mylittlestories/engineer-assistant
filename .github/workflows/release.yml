name: Build & Release (Windows Focus)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== WINDOWS (Main Deliverable) ====================
  windows:
    name: Build & Release Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run build:desktop

      - name: Build Windows installer + portable
        run: npm run dist:win

      - name: List built files
        run: dir release

      - name: Create GitHub Release + Attach EXE files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Engineer Assistant ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== LINUX (Optional) ====================
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run dist:linux
      - name: Upload Linux artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*
          retention-days: 3

  # ==================== ANDROID (Optional) ====================
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:sync
      - name: Build APK
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug
      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Engineer-Assistant-Android-${{ github.ref_name }}.apk
      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release/*.apk
          retention-days: 3