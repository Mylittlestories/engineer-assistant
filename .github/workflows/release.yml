name: Build and Release Engineer Assistant

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run dist:win
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exes
          path: release/*.exe
          retention-days: 5

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run dist:linux
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release/*
          retention-days: 5

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:sync
      - name: Build APK
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug
      - name: Prepare APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Engineer-Assistant-Android-${{ github.ref_name }}.apk
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/*.apk
          retention-days: 5

  # ==================== SINGLE RELEASE JOB ====================
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    # Only run on version tags
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "=== Files ready for release ==="
          find downloaded-artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.apk" \)

      - name: Create Release and Attach Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Engineer Assistant ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            downloaded-artifacts/*.exe
            downloaded-artifacts/*.AppImage
            downloaded-artifacts/*.deb
            downloaded-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}