name: Build & Release Engineer Assistant

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run dist:win
      - name: Upload Windows EXEs
        uses: actions/upload-artifact@v4
        with:
          name: windows-exes
          path: release/*.exe
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:desktop
      - run: npm run dist:linux
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release/*
          retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:sync
      - name: Build Android APK
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug
      - name: Collect APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/Engineer-Assistant-Android-${{ github.ref_name }}.apk
      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/*.apk
          retention-days: 7

  # ==================== RELEASE ====================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Show what we have
        run: |
          echo "=== Files in all-artifacts ==="
          find all-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Engineer Assistant ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            all-artifacts/*.exe
            all-artifacts/*.AppImage
            all-artifacts/*.deb
            all-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}